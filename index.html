<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語暗記アプリ（シンプル）</title>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }

.card {
  border: 2px solid #333;
  padding: 40px;
  font-size: 24px;
  margin: 20px auto;
  width: 300px;
  cursor: pointer;
  white-space: pre-line;
}

button { padding: 10px 20px; margin: 10px; font-size: 16px; }
</style>
</head>

<body>

<div id="login">
  <h3>パスワードを入力してください</h3>
  <input type="password" id="pass">
  <button onclick="checkPass()">ログイン</button>
</div>

<div id="app" style="display:none;">

<h2>単語暗記アプリ（シンプル）</h2>

<input type="file" id="fileInput"><br><br>

開始No: <input type="number" id="start" value="1">
終了No: <input type="number" id="end" value="50">
<br><br>

<label><input type="radio" name="mode" value="wordToMeaning" checked> 単語→翻訳</label>
<label><input type="radio" name="mode" value="meaningToWord"> 翻訳→単語</label>
<br><br>

<label><input type="checkbox" id="shuffle"> シャッフルする</label>
<br><br>

<button onclick="startApp()">スタート</button>
<button onclick="reviewWrong()">苦手だけ復習</button>

<div class="card" onclick="flip()" id="card">ここに表示</div>

<button onclick="known()">覚えた</button>
<button onclick="unknown()">覚えてない</button>

<h3 id="score">正答率：0%</h3>

</div>

<script>
let data = [];
let filtered = [];
let index = 0;
let flipped = false;
let wrongList = [];

let correct = 0;
let total = 0;

// パスワード
function checkPass() {
  const correctPass = "is212020";
  const input = document.getElementById("pass").value;

  if (input === correctPass) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("パスワードが違います");
  }
}

// CSV読み込み（No,expression,Meaning対応）
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    const rows = text.split("\n").slice(1);

    data = rows
      .map(row => row.trim())
      .filter(row => row !== "")
      .map(row => {
        const cols = row.split(",");
        return {
          no: parseInt(cols[0]),
          expression: cols[1],
          meaning: cols[2]
        };
      });

    alert("読み込み完了！");
  };

  reader.readAsText(file);
});

// モード取得
function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

// シャッフル
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// スタート
function startApp() {
  const startNo = parseInt(document.getElementById("start").value);
  const endNo = parseInt(document.getElementById("end").value);

  filtered = data.filter(d => d.no >= startNo && d.no <= endNo);

  if (document.getElementById("shuffle").checked) {
    shuffleArray(filtered);
  }

  index = 0;
  flipped = false;
  correct = 0;
  total = 0;
  wrongList = [];

  updateScore();
  show();
}

// 表示
function show() {
  flipped = false;

  if (index >= filtered.length) {
    document.getElementById("card").innerText = "終了！";
    return;
  }

  const item = filtered[index];
  const mode = getMode();

  document.getElementById("card").innerText =
    "No." + item.no + "\n\n" +
    (mode === "wordToMeaning" ? item.expression : item.meaning);
}

// 裏返し
function flip() {
  if (!filtered[index]) return;

  flipped = !flipped;
  const item = filtered[index];
  const mode = getMode();

  document.getElementById("card").innerText = flipped
    ? "No." + item.no + "\n\n" +
      (mode === "wordToMeaning" ? item.meaning : item.expression)
    : "No." + item.no + "\n\n" +
      (mode === "wordToMeaning" ? item.expression : item.meaning);
}

// 覚えた
function known() {
  correct++;
  total++;
  next();
}

// 覚えてない
function unknown() {
  wrongList.push(filtered[index]);
  total++;
  next();
}

// 次へ
function next() {
  index++;
  updateScore();
  show();
}

// 正答率
function updateScore() {
  const rate = total === 0 ? 0 : Math.round((correct / total) * 100);
  document.getElementById("score").innerText = "正答率：" + rate + "%";
}

// 苦手復習
function reviewWrong() {
  if (wrongList.length === 0) {
    alert("苦手単語がありません！");
    return;
  }

  filtered = [...wrongList];
  index = 0;
  correct = 0;
  total = 0;

  updateScore();
  show();
}
</script>

</body>
</html>
